services:
    minio:
        restart: always
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        container_name: mlflow_s3
        ports:
            - "9000:9000"
            - "9002:9002"
        command: server /data --console-address ':9002' --address ':9000'
        environment:
            - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID}
            - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY}
        volumes:
            - minio_data:/data
        networks:
            - ml

    db:
        restart: always
        image: mysql/mysql-server:8.0.32-1.2.11-server
        container_name: mlflow_db
        ports:
            - "3306:3306"
        command: --log-bin-trust-function-creators=1
        environment:
            - MYSQL_DATABASE=${MYSQL_DATABASE}
            - MYSQL_USER=${MYSQL_USER}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD}
            - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - ml
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    web:
        restart: always
        build: ./docker/mlflow-docker
        image: mlflow_server
        container_name: mlflow_server
        ports:
          - "5000:5000"
        depends_on:
            db:
                condition: service_healthy
        environment:
            - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - MLFLOW_FLASK_SERVER_SECRET_KEY=${MLFLOW_FLASK_SERVER_SECRET_KEY}
            - MLFLOW_AUTH_CONFIG_PATH=/mlflow/credentials
            - MLFLOW_SERVER_ENABLE_JOB_EXECUTION=false
        volumes:
            - ${CONFIG_ROOT}/configs/mlflow/credentials:/mlflow/credentials
        command: mlflow server --backend-store-uri mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE} --artifacts-destination s3://mlflow/ --host 0.0.0.0 --allowed-hosts "mlflow.urbanairlab.hn,*.urbanairlab.hn,localhost:5000" --cors-allowed-origins "https://mlflow.urbanairlab.hn,http://localhost:5000" --app-name=basic-auth --workers 1
        networks:
            - ml
            - frontend
        labels:
          - "traefik.enable=true"
          - "traefik.docker.network=ual_infrastructure_deployments_frontend"

          - "traefik.http.routers.mlflow-secure.rule=Host(`mlflow.${TRAEFIK_DOMAIN}`)"
          - "traefik.http.routers.mlflow-secure.entrypoints=websecure"
          - "traefik.http.routers.mlflow-secure.tls=true"
          - "traefik.http.routers.mlflow-secure.tls.certresolver=myresolver"
networks:
  ml:
  frontend:

volumes:
    dbdata:
    minio_data:
