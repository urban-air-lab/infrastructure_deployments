services:
    minio:
        restart: always
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        container_name: mlflow_s3
        ports:
            - "9000:9000"
            - "9002:9002"
        command: server /data --console-address ':9002' --address ':9000'
        environment:
            - MINIO_ROOT_USER=${AWS_ACCESS_KEY_ID}
            - MINIO_ROOT_PASSWORD=${AWS_SECRET_ACCESS_KEY}
        volumes:
            - minio_data:/data
        networks:
            - ml

    db:
        restart: always
        image: mysql/mysql-server
        container_name: mlflow_db
        ports:
            - "3306:3306"
        environment:
            - MYSQL_DATABASE=${MYSQL_DATABASE}
            - MYSQL_USER=${MYSQL_USER}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD}
            - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - ml

    web:
        restart: always
        build: ./docker/mlflow-docker
        image: mlflow_server
        container_name: mlflow_server
        depends_on:
            - db
        environment:
            - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - MLFLOW_FLASK_SERVER_SECRET_KEY=${MLFLOW_FLASK_SERVER_SECRET_KEY}
            - MLFLOW_AUTH_CONFIG_PATH=/mlflow/credentials
            - MLFLOW_SERVER_ENABLE_JOB_EXECUTION=false
        volumes:
            - /opt/ual/mlflow/credentials:/mlflow/credentials
        command: mlflow server --backend-store-uri mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE} --artifacts-destination s3://mlflow/ --host 0.0.0.0 --allowed-hosts "mlflow.urbanairlab.hn" --app-name=basic-auth --workers 1
        networks:
            - ml
            - frontend
        labels:
          - "traefik.enable=true"
          - "traefik.docker.network=ual_infrastructure_deployments_frontend"

          # unlike influx/ grafana image is self build and doesn´t expose port by default
          - "traefik.http.services.mlflow.loadbalancer.server.port=5000"

          - "traefik.http.routers.mlflow-secure.rule=Host(`mlflow.${TRAEFIK_DOMAIN}`)"
          - "traefik.http.routers.mlflow-secure.entrypoints=websecure"
          - "traefik.http.routers.mlflow-secure.tls=true"
          - "traefik.http.routers.mlflow-secure.tls.certresolver=myresolver"
networks:
  ml:
  frontend:

volumes:
    dbdata:
    minio_data:
