services:
  node_exporter:
    image: quay.io/prometheus/node-exporter:v1.10.2
    container_name: node_exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - monitoring
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    restart: always
    ports:
      - "8080:8080"
    networks:
      - monitoring
    volumes:
      - /:/rootfs:ro
      - /run:/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true

  prometheus:
    image: docker.io/prom/prometheus:v3.6.0
    container_name: prometheus
    restart: always
    networks:
      - monitoring
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=2GB
    ports:
      - "9090:9090"
    volumes:
      - /opt/ual/configs/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - /opt/ual/configs/prometheus/alerts.yaml:/etc/prometheus/alerts.yaml:ro
      - prometheus-data:/prometheus

  alertmanager:
    image: alertmanager-envsubst:v0.31.1
    build: ./alertmanager-docker
    container_name: alertmanager
    restart: always
    ports:
      - "9093:9093"
    entrypoint:
      - /bin/sh
      - -c
      - |
        envsubst < /etc/alertmanager/alertmanager.yaml > /tmp/alertmanager.yaml &&
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yaml
    volumes:
      - /opt/ual/configs/alertmanager/alertmanager.yaml:/etc/alertmanager/alertmanager.yaml:ro
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_AUTH=${SMTP_AUTH}
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:12.3.2-security-01-ubuntu
    container_name: grafana
    restart: always
    networks:
      - iot
      - frontend
      - monitoring
    ports:
      - "3000:3000"
    volumes:
      - /opt/ual/configs/grafana-provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=ual_infrastructure_deployments_frontend"

      - "traefik.http.routers.grafana.rule=Host(`grafana.${TRAEFIK_DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=myresolver"

networks:
  iot:
  frontend:
  monitoring:

volumes:
  grafana-data:
  prometheus-data:
