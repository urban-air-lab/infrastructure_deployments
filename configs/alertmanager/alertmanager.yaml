global:
  smtp_smarthost: ${SMTP_HOST}
  smtp_from: 'post@tobias-weiland.eu'
  smtp_auth_username: ${SMTP_USER}
  smtp_auth_password: ${SMTP_AUTH}
  smtp_require_tls: true

route:
  receiver: 'email-alerts'
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 24h

receivers:
  - name: 'email-alerts'
    email_configs:
      - to: 'post@tobias-weiland.eu'
        send_resolved: true
      - to: 'Marc.Golder@hs-heilbronn.de'
        send_resolved: true