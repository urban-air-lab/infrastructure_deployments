name: "Deploy Influx Services"

on:
  workflow_dispatch:

jobs:
  deploy-influx-services:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up SSH
        run: | 
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
        

      - name: Create mosquitto password file
        run: |
          sudo apt-get install -y mosquitto
          
          rm -f ./configs/mosquitto/passwordfile
    
          mosquitto_passwd -b -c ./configs/mosquitto/passwordfile "${{ secrets.MQTT_USERNAME }}" "${{ secrets.MQTT_PASSWORD }}"
          chmod 600 ./configs/mosquitto/passwordfile


      - name: Extend mosquitto config
        run: |
          echo "" >> ./configs/mosquitto/mosquitto.conf
          echo "connection bridge_to_remote" >> ./configs/mosquitto/mosquitto.conf
          echo "address 91.132.147.167:1883" >> ./configs/mosquitto/mosquitto.conf
          echo "topic sensors/# out 2" >> ./configs/mosquitto/mosquitto.conf
          echo "username ${{ secrets.HHN_FORWARD_USERNAME }}" >> ./configs/mosquitto/mosquitto.conf
          echo "password ${{ secrets.HHN_FORWARD_PASSWORD }}" >> ./configs/mosquitto/mosquitto.conf


      - name: Copy configs to remote
        run: |
              ssh root@urbanairlab.hn "mkdir -p /opt/ual"
              rsync -az --delete \
              ./configs \
              root@urbanairlab.hn:/opt/ual/
          
              ssh root@urbanairlab.hn "chmod 644 /opt/ual/configs/mosquitto/passwordfile"


      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT }}


      - name: Deploy Influx, MQTT, Telegraf and Grafana
        env:
          TRAEFIK_DOMAIN: urbanairlab.hn

          INFLUX_URL: "${{ secrets.INFLUX_URL }}"
          INFLUX_ORG: "${{ secrets.INFLUX_ORG }}"

          DOCKER_INFLUXDB_INIT_USERNAME: "${{ secrets.DOCKER_INFLUXDB_INIT_USERNAME }}"
          DOCKER_INFLUXDB_INIT_PASSWORD: "${{ secrets.DOCKER_INFLUXDB_INIT_PASSWORD }}"
          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${{ secrets.DOCKER_INFLUXDB_INIT_ADMIN_TOKEN }}"

          GF_SECURITY_ADMIN_USER: "${{ secrets.GF_SECURITY_ADMIN_USER }}"
          GF_SECURITY_ADMIN_PASSWORD: "${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}"

          LUBW_USERNAME: "${{ secrets.LUBW_USERNAME }}"
          LUBW_PASSWORD: "${{ secrets.LUBW_PASSWORD }}"
          LUBW_BASE_URL: "${{ secrets.LUBW_BASE_URL }}"

          MQTT_USERNAME: "${{ secrets.MQTT_USERNAME }}"
          MQTT_PASSWORD: "${{ secrets.MQTT_PASSWORD }}"
          MQTT_SERVER: "${{ secrets.MQTT_SERVER }}"
          MQTT_PORT: "${{ secrets.MQTT_PORT }}"
        run: |
          docker -H ssh://root@urbanairlab.hn compose -p ual_infrastructure_deployments  -f docker-compose.yaml rm -f -s -v
          docker -H ssh://root@urbanairlab.hn compose -p ual_infrastructure_deployments  -f docker-compose.yaml --env-file compose.env up -d --pull always
          
          
