name: "Deploy Monitoring Services"

on:
  workflow_dispatch:

jobs:
  deploy-monitoring-services:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up SSH
        run: | 
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Copy configs to remote
        run: |
              ssh root@urbanairlab.hn "mkdir -p /opt/ual"
              rsync -az --delete \
              ./configs \
              root@urbanairlab.hn:/opt/ual/


      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.PAT }}


      - name: Deploy Grafana, Prometheus, Node-Exporter, Cadvisor
        env:
          TRAEFIK_DOMAIN: urbanairlab.hn

          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${{ secrets.DOCKER_INFLUXDB_INIT_ADMIN_TOKEN }}"

          GF_SECURITY_ADMIN_USER: "${{ secrets.GF_SECURITY_ADMIN_USER }}"
          GF_SECURITY_ADMIN_PASSWORD: "${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}"
        run: |
          docker -H ssh://root@urbanairlab.hn compose -p ual_infrastructure_deployments  -f docker-compose-monitoring.yaml rm -f -s -v
          docker -H ssh://root@urbanairlab.hn compose -p ual_infrastructure_deployments  -f docker-compose-monitoring.yaml up -d --pull always
          

      #- name: Delete Credentials
        #run: |
            #ssh root@urbanairlab.hn "rm -rf /opt/ual/configs"
          
