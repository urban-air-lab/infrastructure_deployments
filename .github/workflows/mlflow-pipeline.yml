name: "Deploy ML Flow"

on:
  workflow_dispatch:

jobs:
  deploy-ml-services:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create credentials
        run: |
            rm -rf "./configs/mlflow/"
            mkdir "./configs/mlflow/"
            echo "[mlflow]" >> ./configs/mlflow/credentials
            echo "default_permission = read" >> ./configs/mlflow/credentials  
            echo "database_uri = sqlite:///basic_auth.db" >> ./configs/mlflow/credentials  
            echo "admin_username = "${{ secrets.MLFLOW_USERNAME }}"" >> ./configs/mlflow/credentials 
            echo "admin_password = "${{ secrets.MLFLOW_PASSWORD }}"" >> ./configs/mlflow/credentials 
          
            cat credentials

      - name: Copy config to remote
        run: |
              ssh root@urbanairlab.hn "mkdir -p /opt/ual/mlflow"
              rsync -az --delete \
              ./configs/mlflow/ \
              root@urbanairlab.hn:/opt/ual/
          
              ssh root@urbanairlab.hn "chmod 644 /opt/ual/configs/mlflow/credentials"

      - name: Deploy MLFLow and Databases
        env:
          TRAEFIK_DOMAIN: urbanairlab.hn
          MLFLOW_URL: "${{ secrets.MLFLOW_URL }}"
          MLFLOW_FLASK_SERVER_SECRET_KEY: "${{ secrets.MLFLOW_FLASK_SERVER_SECRET_KEY }}"
          MLFLOW_USERNAME: "${{ secrets.MLFLOW_USERNAME }}"
          MLFLOW_PASSWORD: "${{ secrets.MLFLOW_PASSWORD }}"
          MLFLOW_HTTP_POOL_CONNECTIONS: 30

          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

          MYSQL_DATABASE: "${{ secrets.MYSQL_DATABASE }}"
          MYSQL_USER: "${{ secrets.MYSQL_USER }}"
          MYSQL_PASSWORD: "${{ secrets.MYSQL_PASSWORD }}"
          MYSQL_ROOT_PASSWORD: "${{ secrets.MYSQL_ROOT_PASSWORD }}"
        run: |
          docker -H ssh://root@urbanairlab.hn compose -p ual_infrastructure_deployments  -f docker-compose-ml.yaml rm -f -s -v
          docker -H ssh://root@urbanairlab.hn compose -p ual_infrastructure_deployments  -f docker-compose-ml.yaml up -d --pull always --build

      #- name: Delete Credentials
        #run: |
            #ssh root@urbanairlab.hn "rm -rf /opt/ual/mlflow"

          
          
