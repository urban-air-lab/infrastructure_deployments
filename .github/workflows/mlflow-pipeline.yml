name: "Deploy ML Flow"

on:
  workflow_dispatch:

jobs:
  deploy-ml-services:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          echo "${{ secrets.SSH_PRIVATE_KEY }}" >> ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Create credentials on server
        run: |
            ssh root@urbanairlab.hn "mkdir -p /opt/ual/mlflow && cat > /opt/ual/mlflow/credentials <<'EOF'
            [mlflow]
            default_permission = read
            database_uri = sqlite:///basic_auth.db
            admin_username = "${{ secrets.MLFLOW_USERNAME }}"
            admin_password = "${{ secrets.MLFLOW_PASSWORD }}"
            EOF
            chmod 600 /opt/ual/mlflow/credentials"

      - name: Create mlflow docker file on server
        run: |
              ssh root@urbanairlab.hn "mkdir -p /opt/ual/mlflow-docker"
              rsync -az --delete \
              ./mlflow-docker \
              root@urbanairlab.hn:/opt/ual/
              chmod 600 /opt/ual/mlflow-docker/Dockerfile
              chmod 600 /opt/ual/mlflow-docker/requirements.txt

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy MLFLow and Databases
        env:
          TRAEFIK_DOMAIN: urbanairlab.hn
          MLFLOW_URL: "${{ secrets.MLFLOW_URL }}"
          MLFLOW_FLASK_SERVER_SECRET_KEY: "${{ secrets.MLFLOW_FLASK_SERVER_SECRET_KEY }}"
          MLFLOW_USERNAME: "${{ secrets.MLFLOW_USERNAME }}"
          MLFLOW_PASSWORD: "${{ secrets.MLFLOW_PASSWORD }}"

          AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
          AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"

          MYSQL_DATABASE: "${{ secrets.MYSQL_DATABASE }}"
          MYSQL_USER: "${{ secrets.MYSQL_USER }}"
          MYSQL_PASSWORD: "${{ secrets.MYSQL_PASSWORD }}"
          MYSQL_ROOT_PASSWORD: "${{ secrets.MYSQL_ROOT_PASSWORD }}"
        run: |
          docker -H ssh://root@urbanairlab.hn compose -p ual_infrastructure_deployments  -f docker-compose-ml.yaml rm -f -s -v
          docker -H ssh://root@urbanairlab.hn compose -p ual_infrastructure_deployments  -f docker-compose-ml.yaml up -d --pull always --build
          
          
